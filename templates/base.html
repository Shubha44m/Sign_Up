<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Django Auth{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ecb2ff",
                        "on-background": "#e5e2e3",
                        "background": "#131314",
                        "surface": "#1c1b1c",
                        "outline": "#9d8ba0",
                        "primary-container": "#bd00ff",
                        "on-primary-container": "#ffffff",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#00eefc",
                        "outline-variant": "#514255",
                    }
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(18, 18, 20, 0.4);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow-primary {
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .floating-label-input:focus-within label,
        .floating-label-input input:not(:placeholder-shown) + label {
            transform: translateY(-24px) scale(0.85);
            color: #ecb2ff;
        }
    </style>
</head>
<body class="bg-background text-on-background font-sans overflow-hidden">
<main class="flex min-h-screen">
    <!-- Left Side: Visual Showcase (Simplified) -->
    {% block side_visual %}
    <section class="hidden lg:flex lg:w-1/2 relative flex-col justify-center px-8 lg:px-12 overflow-hidden bg-[#0A0A0B]">
        <div class="absolute inset-0 z-0">
            <img class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuClaed-wmCINC15ZMLVuz01eJB4bfqT7GPDNXJtVyFahSKKE6XamR2w6LnQi6Mfqxcro2BM7GTIYCFQ1taHiJON5tsPSEwVfQEiWHcvCwg7x4x4PgcxAz7r31IRSRLKDVuIwSHTtbzIzXw1Uy-8rqVG213j-q7ID1G7gUTI_tU5o4-mpbEsY81StQ8Ee7DJYzPNFva7Dx1_Bxs5mrLUu3lZ_x1u3dc4Ln3OE4GswMPURR-bDg4xNGYcR7r4Uc6JENGmcoSCEtWzSnen" alt="Background Visual">
            <div class="absolute inset-0 bg-gradient-to-r from-[#0A0A0B] via-transparent to-[#0A0A0B]/80"></div>
        </div>
        <!-- Branding removed as requested -->
    </section>
    {% endblock %}

    <!-- Right Side: Content Area -->
    <section class="w-full lg:w-1/2 flex items-center justify-center p-4 sm:p-8 bg-background relative overflow-y-auto">
        <div class="absolute top-1/4 right-1/4 w-64 h-64 bg-primary-container/10 blur-[100px] rounded-full"></div>
        
        <div class="glass-panel w-full max-w-md p-6 sm:p-8 rounded-xl shadow-2xl relative z-10">
            <!-- Message Alerts -->
            {% if messages %}
                <div id="messages-container" class="mb-6 space-y-2 transition-opacity duration-500">
                    {% for message in messages %}
                        <div class="p-4 rounded-lg text-sm {% if message.tags == 'error' %}bg-error-container text-on-error-container{% else %}bg-primary-container text-on-primary-container{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}
            {% endblock %}
        </div>
    </section>
</main>

<script>
    function togglePassword(btn) {
        const input = btn.previousElementSibling;
        const icon = btn.querySelector('span');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility';
        }
    }

    // Auto-hide messages after 3 seconds
    const messagesContainer = document.getElementById('messages-container');
    if (messagesContainer) {
        setTimeout(() => {
            messagesContainer.style.opacity = '0';
            setTimeout(() => {
                messagesContainer.style.display = 'none';
            }, 500); // Wait for transition to finish
        }, 3000);
    }
</script>
</body>
</html>
