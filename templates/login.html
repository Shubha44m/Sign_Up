{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="text-center mb-6 sm:mb-8">
    <h2 class="text-2xl sm:text-3xl font-bold text-on-background mb-2">Login</h2>
    <p class="text-outline">Please enter your details</p>
</div>

<form class="space-y-6" method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    
    <div class="relative floating-label-input group">
        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined">person</span>
        </div>
        <input class="w-full bg-[#1c1b1c] border border-outline-variant rounded-lg py-4 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary transition-all placeholder-transparent" 
               id="{{ form.username.id_for_label }}" 
               name="username" 
               placeholder=" " 
               type="text" 
               required/>
        <label class="absolute left-12 top-1/2 -translate-y-1/2 text-outline pointer-events-none transition-all duration-200" for="{{ form.username.id_for_label }}">
            Username
        </label>
    </div>

    <div class="relative floating-label-input group">
        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined">lock</span>
        </div>
        <input class="w-full bg-[#1c1b1c] border border-outline-variant rounded-lg py-4 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary transition-all placeholder-transparent" 
               id="{{ form.password.id_for_label }}" 
               name="password" 
               placeholder=" " 
               type="password" 
               required/>
        <label class="absolute left-12 top-1/2 -translate-y-1/2 text-outline pointer-events-none transition-all duration-200" for="{{ form.password.id_for_label }}">
            Password
        </label>
        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button" onclick="togglePassword(this)">
            <span class="material-symbols-outlined">visibility</span>
        </button>
    </div>

    <div class="flex flex-col sm:flex-row items-center justify-between text-sm gap-4 sm:gap-0">
        <label class="flex items-center space-x-2 cursor-pointer text-outline hover:text-on-surface transition-colors w-full sm:w-auto">
            <input class="rounded border-outline-variant bg-[#1c1b1c] text-primary focus:ring-primary" type="checkbox" name="remember_me"/>
            <span>Remember me</span>
        </label>
        <a class="text-primary hover:underline" href="#">Forgot password?</a>
    </div>

    <button class="w-full py-4 rounded-lg bg-gradient-to-r from-primary-container to-[#bd00ff] text-white font-bold neon-glow-primary active:scale-[0.98] transition-all" type="submit">
        Login
    </button>
</form>

<div class="relative my-8">
    <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-outline-variant/30"></div>
    </div>
    <div class="relative flex justify-center text-xs uppercase tracking-widest text-outline">
        <span class="px-4 bg-[#131314]">Or continue with</span>
    </div>
</div>

<div class="grid grid-cols-2 gap-4">
    <button class="flex items-center justify-center space-x-2 py-3 border border-outline-variant rounded-lg hover:bg-white/5 transition-all">
        <img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAah2u7iRdq77HJ1BllxUMbdUUGNXW_9S9qTIJdTQtWJGVOMrC59V13HchGJswH2eQLxRuzmjIvyGQlGG0VI6YcczcNvs2Vz0NBBaAHtf6C9pZYt3UoQTdp3Tie7r0EiHngFzeMmgyg9lm8q0AQn97juM_80DRFMEDWr7JGTStZTd2FZ_JeXg3rhzzFM2R2a5giNQez9ETbrWzHdJyktsLQfYCjL0LqZPETXZI0mEM6PyfjAsDNJrA-VoRq9gsCF5lQgkzuGgvKOXih"/>
        <span class="text-sm">Google</span>
    </button>
    <button class="flex items-center justify-center space-x-2 py-3 border border-outline-variant rounded-lg hover:bg-white/5 transition-all">
        <svg class="w-5 h-5 fill-on-surface" viewbox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        <span class="text-sm">GitHub</span>
    </button>
</div>

<p class="mt-8 text-center text-outline">
    Don't have an account? 
    <a class="text-primary font-bold hover:underline ml-1" href="{% url 'signup' %}">Sign Up</a>
</p>
{% endblock %}
